name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FinanceCore.slnx

      - name: Build (Release, no restore)
        # /warnaserror:CS* limita el "warning as error" a warnings del compilador de C#
        # (CS*) y excluye los de NuGet (NU*). Esto evita que CVE advisories
        # publicadas después de un commit rompan el CI sin que hayamos
        # cambiado código. Las advisories se siguen reportando como warnings
        # y se gestionan vía bumps + NuGetAuditSuppress en los csproj.
        run: dotnet build FinanceCore.slnx --configuration Release --no-restore /warnaserror:CS* /p:TreatWarningsAsErrors=false

  unit-tests:
    name: Unit tests (Domain)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore tests/FinanceCore.Domain.Tests/FinanceCore.Domain.Tests.csproj

      - name: Run domain tests with coverage
        run: |
          dotnet test tests/FinanceCore.Domain.Tests/FinanceCore.Domain.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=domain-tests.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Domain

      - name: Upload domain test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-test-results
          path: TestResults/Domain
          retention-days: 7

  integration-tests:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Los runners ubuntu-latest traen Docker preinstalado, que es lo que
      # Testcontainers necesita para levantar Postgres.
      - name: Verify Docker
        run: docker --version && docker info

      - name: Restore
        run: dotnet restore tests/FinanceCore.Infrastructure.IntegrationTests/FinanceCore.Infrastructure.IntegrationTests.csproj

      - name: Run integration tests
        run: |
          dotnet test tests/FinanceCore.Infrastructure.IntegrationTests/FinanceCore.Infrastructure.IntegrationTests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Integration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/Integration
          retention-days: 7

  e2e:
    name: E2E (Playwright, full-stack)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    env:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://localhost:5000
      # Override de CI (NO es secreto de producción). JwtOptions exige >= 32 chars;
      # esto garantiza que el login funcione aun si appsettings.Development.json
      # (que trae su propia SigningKey) estuviera gitignored en el checkout de CI.
      Jwt__SigningKey: ci-e2e-signing-key-not-a-prod-secret-0123456789ab
      NEXT_PUBLIC_API_URL: http://localhost:5000
      E2E_API_URL: http://localhost:5000
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      # Postgres + Redis del compose. Postgres aplica V001..V006 vía el mount a
      # /docker-entrypoint-initdb.d, así que la cuenta/institución seed (V006) ya
      # existen cuando arranca el backend. --wait bloquea hasta el healthcheck.
      - name: Start Postgres + Redis
        run: docker compose up -d --wait postgres redis

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build API
        run: dotnet build src/FinanceCore.API/FinanceCore.API.csproj --configuration Release

      # Backend en background. El IdentitySeeder crea el admin al arrancar
      # (admin@financecore.local); la cuenta seed la provee V006. nohup para que
      # el proceso sobreviva al fin del step.
      - name: Run API (background)
        run: |
          nohup dotnet run --no-build --project src/FinanceCore.API/FinanceCore.API.csproj --configuration Release > api.log 2>&1 &
          echo "API lanzada (pid $!)"

      - name: Wait for API /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              echo "API healthy tras $((i*2))s"; exit 0
            fi
            sleep 2
          done
          echo "::error::La API no respondió /health a tiempo"; cat api.log; exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install Playwright (chromium + deps)
        working-directory: web
        run: npx playwright install --with-deps chromium

      # Playwright levanta `next dev` (webServer) y corre los 3 flows backbone:
      # auth, transactions-upload, reconciliation.
      - name: Run E2E suite
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-api-log
          path: api.log
          if-no-files-found: ignore
          retention-days: 7

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e]
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build:            ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests:       ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E (Playwright):  ${{ needs.e2e.result }}" >> $GITHUB_STEP_SUMMARY
