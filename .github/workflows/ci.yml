name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FinanceCore.slnx

      - name: Build (Release, no restore)
        # /warnaserror:CS* limita el "warning as error" a warnings del compilador de C#
        # (CS*) y excluye los de NuGet (NU*). Esto evita que CVE advisories
        # publicadas después de un commit rompan el CI sin que hayamos
        # cambiado código. Las advisories se siguen reportando como warnings
        # y se gestionan vía bumps + NuGetAuditSuppress en los csproj.
        run: dotnet build FinanceCore.slnx --configuration Release --no-restore /warnaserror:CS* /p:TreatWarningsAsErrors=false

  unit-tests:
    name: Unit tests (Domain)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore tests/FinanceCore.Domain.Tests/FinanceCore.Domain.Tests.csproj

      - name: Run domain tests with coverage
        run: |
          dotnet test tests/FinanceCore.Domain.Tests/FinanceCore.Domain.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=domain-tests.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Domain

      - name: Upload domain test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-test-results
          path: TestResults/Domain
          retention-days: 7

  integration-tests:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Los runners ubuntu-latest traen Docker preinstalado, que es lo que
      # Testcontainers necesita para levantar Postgres.
      - name: Verify Docker
        run: docker --version && docker info

      - name: Restore
        run: dotnet restore tests/FinanceCore.Infrastructure.IntegrationTests/FinanceCore.Infrastructure.IntegrationTests.csproj

      - name: Run integration tests
        run: |
          dotnet test tests/FinanceCore.Infrastructure.IntegrationTests/FinanceCore.Infrastructure.IntegrationTests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Integration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/Integration
          retention-days: 7

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build:            ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests:       ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
